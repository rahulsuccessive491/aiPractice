services:
  - type: web
    name: ai-skills-portal-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && node seed-profiles.js; npm start
    disk:
      name: portal-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false          # set manually in Render dashboard: https://ai-skills-portal.vercel.app
      - key: NODE_VERSION
        value: 20.18.0
      - key: DB_FILE
        value: /var/data/portal.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
